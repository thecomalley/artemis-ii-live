<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artemis II — Live Mission Tracker</title>
  <meta name="description" content="Live mission tracking for NASA's Artemis II crewed lunar mission." />
  <meta property="og:title" content="Artemis II — Live Mission Tracker" />
  <meta property="og:description" content="Live mission tracking for NASA's Artemis II crewed lunar mission." />
  <meta property="og:image" content="https://thespacedevs-prod.nyc3.digitaloceanspaces.com/media/images/space_launch_sy_image_20220331082429.jpeg" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <!-- Mounted by header.js -->
    </header>
    <div id="columns">
      <aside id="col-timeline">
        <!-- Mounted by timeline.js -->
      </aside>
      <div id="splitter-v" class="splitter splitter--v" title="Drag to resize · Double-click to reset"></div>
      <main id="col-video">
        <div id="video-wrap">
          <!-- Mounted by video.js -->
        </div>
        <div id="splitter-h" class="splitter splitter--h" title="Drag to resize · Double-click to reset"></div>
        <div id="crew-below-video">
          <!-- Mounted by crew.js -->
        </div>
        <div id="mission-complete-overlay">
          <div class="mc-inner">
            <div class="mc-title">MISSION COMPLETE</div>
            <div class="mc-subtitle">Artemis II — Orion Integrity</div>
            <div class="mc-met"></div>
            <div class="mc-desc">Crew safely recovered. Humanity's return to the Moon achieved.</div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
